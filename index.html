<!DOCTYPE html>
<html>
<head>
  <title>StudyHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- TESSERACT (IA REAL) -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    body {
      margin:0;
      background:black;
      color:white;
      font-family:Arial;
      display:flex;
    }

    .sidebar {
      width:200px;
      padding:20px;
      background:rgba(255,255,255,0.05);
    }

    .sidebar button {
      display:block;
      width:100%;
      margin:10px 0;
      padding:10px;
      border-radius:10px;
      border:1px solid white;
      background:transparent;
      color:white;
    }

    .main {
      flex:1;
      padding:20px;
    }

    .section { display:none; }
    .active { display:block; }

    table {
      width:100%;
      border-collapse:collapse;
    }

    td, th {
      border:1px solid rgba(255,255,255,0.2);
      padding:10px;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>StudyHub</h2>
  
  <button onclick="showSection('home')">Home</button>
  <button onclick="showSection('schedule')">Horário</button>
  <button onclick="showSection('tests')">Testes</button>
  <button onclick="showSection('videos')">Vídeos</button>
  <button onclick="showSection('ia')">IA</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- HOME -->
<div id="home" class="section active">
  <h1>StudyHub</h1>
  <p>Bem-vindo! Usa o menu.</p>
</div>

<!-- HORÁRIO -->
<div id="schedule" class="section">
  <h2>Horário</h2>
  <table id="scheduleTable"></table>
</div>

<!-- TESTES -->
<div id="tests" class="section">
  <h2>Testes</h2>
  <input id="disciplina" placeholder="Disciplina">
  <input id="data" type="date">
  <button onclick="addTest()">Adicionar</button>
  <div id="listaTestes"></div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
  <h2>Vídeos</h2>
  <input id="videoLink" placeholder="Link">
  <button onclick="addVideo()">Adicionar</button>
  <div id="listaVideos"></div>
</div>

<!-- IA -->
<div id="ia" class="section">
  <h2>IA (Fotos)</h2>
  <input type="file" id="imageInput" accept="image/*" multiple>
  <button onclick="analyzeImage()">Analisar</button>
  <pre id="iaOutput"></pre>
</div>

<script>

// NAV
function showSection(id){
  document.querySelectorAll('.section').forEach(s => {
    s.classList.remove('active');
  });

  document.getElementById(id).classList.add('active');
}

// HORÁRIO
const dias=["Hora","Seg","Ter","Qua","Qui","Sex"];
const horas=["08h","09h","10h","11h","12h","13h","14h","15h","16h","17h","18h"];

function loadSchedule(){
  let data=JSON.parse(localStorage.getItem("schedule"))||{};
  let table=document.getElementById("scheduleTable");
  table.innerHTML="";

  let header="<tr>";
  dias.forEach(d=>header+=`<th>${d}</th>`);
  header+="</tr>";
  table.innerHTML+=header;

  horas.forEach(h=>{
    let row=`<tr><th>${h}</th>`;
    for(let i=1;i<dias.length;i++){
      let key=h+"-"+dias[i];
      let val=data[key]||"";
      row+=`<td onclick="editCell('${key}')">${val}</td>`;
    }
    row+="</tr>";
    table.innerHTML+=row;
  });
}

function editCell(key){
  let data=JSON.parse(localStorage.getItem("schedule"))||{};
  let novo=prompt("Disciplina:",data[key]||"");
  if(novo===null) return;
  data[key]=novo;
  localStorage.setItem("schedule",JSON.stringify(data));
  loadSchedule();
}

// TESTES
function addTest(){
  let d=document.getElementById("disciplina").value;
  let data=document.getElementById("data").value;

  let testes=JSON.parse(localStorage.getItem("testes"))||[];
  testes.push({d,data});
  localStorage.setItem("testes",JSON.stringify(testes));
  showTests();
}

function showTests(){
  let lista=document.getElementById("listaTestes");
  lista.innerHTML="";
  let testes=JSON.parse(localStorage.getItem("testes"))||[];

  let hoje = new Date();

  testes.forEach(t=>{
    let dataTeste = new Date(t.data);
    let diff = Math.ceil((dataTeste-hoje)/(1000*60*60*24));

    let texto = diff > 0 ? diff + " dias" :
                 diff === 0 ? "hoje" :
                 "passado";

    lista.innerHTML+=`<p>${t.d} - ${t.data} (${texto})</p>`;
  });
}
// VIDEOS
function addVideo(){
  let link=document.getElementById("videoLink").value;

  let videos=JSON.parse(localStorage.getItem("videos"))||[];
  videos.push(link);
  localStorage.setItem("videos",JSON.stringify(videos));
  showVideos();
}

function showVideos(){
  let lista=document.getElementById("listaVideos");
  lista.innerHTML="";
  let videos=JSON.parse(localStorage.getItem("videos"))||[];

  videos.forEach(v=>{
    lista.innerHTML+=`<p><a href="${v}" target="_blank">Ver vídeo</a></p>`;
  });
}

// IA

function limparTexto(texto){
  let limpo = texto.replace(/[^a-zA-ZÀ-ÿ0-9.,!? \n]/g, " ");
  limpo = limpo.replace(/\s+/g, " ");
  return limpo.trim();
}

function gerarResumo(texto){
  let frases = texto.split(/[.!?]/);
  return frases.slice(0,3).join(". ") + ".";
}

function gerarPerguntas(){
  return `
- Qual é o tema principal?
- Resume o conteúdo.
- Explica por palavras tuas.
`;
}

function analyzeImage(){
  let files = document.getElementById("imageInput").files;
  let out = document.getElementById("iaOutput");

  if(files.length === 0){
    out.innerText = "Escolhe uma imagem.";
    return;
  }

  out.innerText = "🔍 A analisar...";

  let resultados = "";

  Array.from(files).forEach((file, index) => {

   Tesseract.recognize(file, 'por+eng', {
  logger: m => console.log(m)

      resultados += `

// INIT
loadSchedule();
showTests();
showVideos();

</script>

</body>
</html>
