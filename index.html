<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <title>StudyHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; background:black; color:white; font-family:Comic Sans MS; display:flex; }

    /* SIDEBAR */
    .sidebar {
      width: 200px;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      height: 100vh;
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar button {
      display:block;
      width:100%;
      margin:10px 0;
      padding:10px;
      background:transparent;
      color:white;
      border:1px solid white;
      border-radius:10px;
      cursor:pointer;
    }

    .sidebar button:hover {
      background:white;
      color:black;
    }

    /* MAIN */
    .main {
      flex:1;
      padding:20px;
    }

    .section { display:none; }
    .active { display:block; }

    table { width:100%; border-collapse:collapse; }
    td, th { border:1px solid rgba(255,255,255,0.2); padding:10px; cursor:pointer; }

    input { padding:8px; margin:5px; border-radius:10px; border:none; }
    button { padding:8px; margin:5px; border-radius:10px; border:1px solid white; background:transparent; color:white; }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>StudyHub</h2>
  <button onclick="showSection('home')">Home</button>
  <button onclick="showSection('schedule')">Horário</button>
  <button onclick="showSection('tests')">Testes</button>
  <button onclick="showSection('videos')">Vídeos</button>
  <button onclick="showSection('ia')">IA</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- HOME -->
<div id="home" class="section active">
  <h1>Bem-vindo ao StudyHub</h1>
  <p>Organiza. Estuda. Evolui.</p>
</div>

<!-- HORÁRIO -->
<div id="schedule" class="section">
  <h2>Horário</h2>
  <table id="scheduleTable"></table>
</div>

<!-- TESTES -->
<div id="tests" class="section">
  <h2>Testes</h2>
  <input id="disciplina" placeholder="Disciplina">
  <input id="data" type="date">
  <button onclick="addTest()">Adicionar</button>
  <div id="listaTestes"></div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
  <h2>Vídeos</h2>
  <input id="videoLink" placeholder="Link">
  <button onclick="addVideo()">Adicionar</button>
  <div id="listaVideos"></div>
</div>

<!-- IA -->
<div id="ia" class="section">
  <h2>IA (Fotos)</h2>
  <input type="file" id="imageInput" accept="image/*">
  <button onclick="analyzeImage()">Analisar</button>
  <p id="iaOutput"></p>
</div>

</div>

<script>
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// HORÁRIO
const dias=["Hora","Segunda","Terça","Quarta","Quinta","Sexta"];
const horas=[["08:20 - 09:10","09:15 - 10:5","10:20 - 11:10","11:20 - 12:10","12:15 - 13:05","13:05 - 14:15","14:15 - 15:05","15:20 - 16:10","16:20 - 17:10","17:15 - 18:05"];

function loadSchedule(){
  let data=JSON.parse(localStorage.getItem("schedule"))||{};
  let table=document.getElementById("scheduleTable");
  table.innerHTML="";

  let header="<tr>";
  dias.forEach(d=>header+=`<th>${d}</th>`);
  header+="</tr>";
  table.innerHTML+=header;

  horas.forEach(h=>{
    let row=`<tr><th>${h}</th>`;
    for(let i=1;i<dias.length;i++){
      let key=h+"-"+dias[i];
      let val=data[key]||"";
      row+=`<td onclick="editCell('${key}')">${val}</td>`;
    }
    row+="</tr>";
    table.innerHTML+=row;
  });
}

function editCell(key){
  let data=JSON.parse(localStorage.getItem("schedule"))||{};
  let novo=prompt("Disciplina:",data[key]||"");
  if(novo===null) return;
  data[key]=novo;
  localStorage.setItem("schedule",JSON.stringify(data));
  loadSchedule();
}

// TESTES
function addTest(){
  let d=document.getElementById("disciplina").value;
  let data=document.getElementById("data").value;
  if(!d||!data) return;

  let testes=JSON.parse(localStorage.getItem("testes"))||[];
  testes.push({d,data});
  localStorage.setItem("testes",JSON.stringify(testes));
  showTests();
}

function showTests(){
  let lista=document.getElementById("listaTestes");
  lista.innerHTML="";
  let testes=JSON.parse(localStorage.getItem("testes"))||[];

  let hoje=new Date();

  testes.forEach((t,i)=>{
    let diff=Math.ceil((new Date(t.data)-hoje)/(1000*60*60*24));
    lista.innerHTML+=`<p>${t.d} - ${t.data} (${diff} dias)</p>`;
  });
}

// VIDEOS
function addVideo(){
  let link=document.getElementById("videoLink").value;
  if(!link) return;

  let videos=JSON.parse(localStorage.getItem("videos"))||[];
  videos.push(link);
  localStorage.setItem("videos",JSON.stringify(videos));
  showVideos();
}

function showVideos(){
  let lista=document.getElementById("listaVideos");
  lista.innerHTML="";
  let videos=JSON.parse(localStorage.getItem("videos"))||[];

  videos.forEach(v=>{
    lista.innerHTML+=`<p><a href="${v}" target="_blank">Ver vídeo</a></p>`;
  });
}

// IA (simulada)
function analyzeImage(){
  let files = document.getElementById("imageInput").files;
  let out = document.getElementById("iaOutput");

  if(files.length === 0){
    out.innerText = "Escolhe uma imagem.";
    return;
  }

  out.innerText = "🔍 A analisar imagem...";

  let resultados = "";

  Array.from(files).forEach((file, index) => {

    Tesseract.recognize(file, 'por+eng')
    .then(({ data: { text } }) => {

      let textoLimpo = limparTexto(text);
      let resumo = gerarResumo(textoLimpo);
      let perguntas = gerarPerguntas(textoLimpo);

      resultados += `
📸 IMAGEM ${index + 1}

📖 TEXTO:
${textoLimpo.substring(0,300)}...

🧠 RESUMO:
${resumo}

❓ PERGUNTAS:
${perguntas}

-------------------------
`;

      out.innerText = resultados;

    })
    .catch(() => {
      out.innerText = "Erro ao analisar imagem.";
    });

  });
}

loadSchedule();
showTests();
showVideos();
</script>

</body>
</html>
