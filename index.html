<!DOCTYPE html>
<html>
<head>
  <title>StudyHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    .glow {
      position: fixed;
      width: 200px;
      height: 200px;
      background: white;
      filter: blur(120px);
      opacity: 0.2;
      top: 20%;
      left: 40%;
      border-radius: 50%;
      z-index: -1;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 20px;
      margin-top: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    table {
      width: 100%;
      margin-top: 15px;
      border-collapse: collapse;
    }

    td, th {
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px;
      cursor: pointer;
    }

    td:hover {
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

<div class="glow"></div>

<h1>StudyHub</h1>
<p>Organiza. Estuda. Evolui.</p>

<div class="card">
  <h2>Horário Semanal</h2>
  <table id="scheduleTable"></table>
</div>

<script>
  const dias = ["Hora", "Segunda", "Terça", "Quarta", "Quinta", "Sexta"];
  const horas = ["08h", "09h", "10h", "11h", "12h", "14h", "15h", "16h"];

  function loadSchedule() {
    let data = JSON.parse(localStorage.getItem("gridSchedule")) || {};
    const table = document.getElementById("scheduleTable");

    table.innerHTML = "";

    // header
    let header = "<tr>";
    dias.forEach(d => header += `<th>${d}</th>`);
    header += "</tr>";
    table.innerHTML += header;

    // rows
    horas.forEach(hora => {
      let row = `<tr><th>${hora}</th>`;

      for (let i = 1; i < dias.length; i++) {
        let key = hora + "-" + dias[i];
        let value = data[key] || "";

        row += `<td onclick="editCell('${key}')">${value}</td>`;
      }

      row += "</tr>";
      table.innerHTML += row;
    });
  }

  function editCell(key) {
    let data = JSON.parse(localStorage.getItem("gridSchedule")) || {};
    let novo = prompt("Disciplina:", data[key] || "");

    if (novo === null) return;

    data[key] = novo;
    localStorage.setItem("gridSchedule", JSON.stringify(data));

    loadSchedule();
  }

  loadSchedule();
</script>

</body>
</html>
