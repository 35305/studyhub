<!DOCTYPE html>
<html>
<head>
  <title>StudyHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    .glow {
      position: fixed;
      width: 200px;
      height: 200px;
      background: white;
      filter: blur(120px);
      opacity: 0.2;
      top: 20%;
      left: 40%;
      border-radius: 50%;
      z-index: -1;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 20px;
      margin-top: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    table {
      width: 100%;
      margin-top: 15px;
      border-collapse: collapse;
    }

    td, th {
      border: 1px solid rgba(255,255,255,0.2);
      padding: 15px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      background: transparent;
      color: white;
      border: 1px solid white;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: white;
      color: black;
    }
  </style>
</head>

<body>

<div class="glow"></div>

<h1>StudyHub</h1>
<p>Organiza. Estuda. Evolui.</p>

<div class="card">
  <h2>Horário Semanal</h2>

  <table id="scheduleTable">
    <tr>
      <th>Segunda</th>
      <th>Terça</th>
      <th>Quarta</th>
      <th>Quinta</th>
      <th>Sexta</th>
    </tr>
    <tr id="scheduleRow"></tr>
  </table>

  <button onclick="editSchedule()">Editar Horário</button>
</div>

<script>
  function loadSchedule() {
    let data = JSON.parse(localStorage.getItem("simpleSchedule")) || ["", "", "", "", ""];
    const row = document.getElementById("scheduleRow");

    row.innerHTML = "";

    data.forEach(d => {
      row.innerHTML += `<td>${d}</td>`;
    });
  }

  function editSchedule() {
    let data = JSON.parse(localStorage.getItem("simpleSchedule")) || ["", "", "", "", ""];

    const dias = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta"];

    for (let i = 0; i < dias.length; i++) {
      let novo = prompt(`Disciplina para ${dias[i]}:`, data[i]);
      if (novo !== null) {
        data[i] = novo;
      }
    }

    localStorage.setItem("simpleSchedule", JSON.stringify(data));
    loadSchedule();
  }

  loadSchedule();
</script>

</body>
</html>
