      margin: 10px;

    }

</head>

<body>

  <h1>StudyHub</h1>
  <p>Organiza. Estuda. Evolui.</p>

  <div class="card">
    <h2>Horário</h2>
    <p>Em breve</p>
  </div>

  <div class="card">
    <h2>Testes</h2>
    <p>Em breve</p>
  </div>

  <div class="card">

  </div>

</body>
</html>
